

services : 
  api : 
    build : . 
    container_name : api 

    env_file : 
      - .env 

    ports : 
      - "${API_PORT}:${API_PORT}"
      - "${TCP_PORT}:${TCP_PORT}"

    entrypoint: /bin/sh
    command : ./entrypoint.sh 


  postgres : 

    image : postgres:16-alpine 
    container_name : vending_db 

    env_file : 
      - .env 

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASS}
      POSTGRES_DB: ${POSTGRES_DB}

    ports : 
      - "${POSTGRES_PORT}:${POSTGRES_PORT}" 

  